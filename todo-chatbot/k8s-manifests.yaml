# Kubernetes Manifests for Hackathon App
# For Minikube deployment without Helm

# These manifests are generated from the Helm chart templates
# Apply with: kubectl apply -f k8s-manifests/

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hackathon-service-account
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
automountServiceAccountToken: true

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: hackathon-app-secrets
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
type: Opaque
stringData:
  BETTER_AUTH_SECRET: "hackathon-super-secret-jwt-key-change-in-production"
  GROQ_API_KEY: "YOUR_GROQ_API_KEY_HERE"

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app-backend
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hackathon-app
      app.kubernetes.io/instance: hackathon-app
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hackathon-app
        app.kubernetes.io/instance: hackathon-app
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: hackathon-service-account
      containers:
        - name: hackathon-app-backend
          image: "hackathon-backend:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgresql://neondb_owner:npg_QxwPX3uAly9t@ep-twilight-violet-ahbkcefb-pooler.c-3.us-east-1.aws.neon.tech/neondb?sslmode=require"
            - name: BACKEND_CORS_ORIGINS
              value: '["http://localhost:3000", "http://localhost:3001", "http://127.0.0.1:3000"]'
            - name: USE_GROQ
              value: "true"
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hackathon-app-secrets
                  key: BETTER_AUTH_SECRET
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hackathon-app-secrets
                  key: GROQ_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hackathon-app-frontend
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hackathon-app
      app.kubernetes.io/instance: hackathon-app
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hackathon-app
        app.kubernetes.io/instance: hackathon-app
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: hackathon-service-account
      containers:
        - name: hackathon-app-frontend
          image: "hackathon-frontend:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "http://hackathon-app-backend:8000"
            - name: NEXT_PUBLIC_BETTER_AUTH_URL
              value: "http://hackathon-app-backend:8000/api/auth"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "100m"
              memory: "256Mi"

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: hackathon-app-backend
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
    app.kubernetes.io/component: backend

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: hackathon-app-frontend
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
    app.kubernetes.io/component: frontend

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hackathon-app
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: hackathon.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hackathon-app-backend
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: hackathon-app-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hackathon-app-frontend
                port:
                  number: 3000

---
# Test Connection Pod
apiVersion: v1
kind: Pod
metadata:
  name: "hackathon-app-test-connection"
  labels:
    app.kubernetes.io/name: hackathon-app
    app.kubernetes.io/instance: hackathon-app
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - 'hackathon-app-backend:8000'
  restartPolicy: Never
