## Request Flow

```
1. Frontend → POST /api/{user_id}/chat
   Headers:
     Authorization: Bearer <jwt_token>
     X-Conversation-ID: <optional_conversation_id>
   Body:
     { "message": "Add task buy groceries" }

2. Backend validates JWT token
   - Verify signature using BETTER_AUTH_SECRET
   - Extract user_id from token
   - Validate user_id matches URL parameter

3. Fetch or create conversation
   - If conversation_id provided: load from DB
   - Else: create new conversation

4. Load conversation history
   - Fetch all messages for conversation
   - Build context for agent

5. Execute agent with tools
   - Agent processes message
   - Agent selects appropriate MCP tool(s)
   - Tools execute with user validation

6. Store messages
   - Save user message to DB
   - Save assistant response to DB

7. Return response
   - conversation_id for continuity
   - response text
   - tool_calls array
```

---

## Authentication

**JWT Token Requirements**:
- Issued by Better Auth service
- Signed with shared secret (BETTER_AUTH_SECRET)
- Contains user_id and email in payload
- Must not be expired

**Token Verification**:
```python
from jose import jwt, JWTError

try:
    payload = jwt.decode(
        token,
        settings.BETTER_AUTH_SECRET,
        algorithms=["HS256"]
    )
    user_id = payload.get("user_id")
    email = payload.get("email")
except JWTError:
    raise HTTPException(status_code=401, detail="Invalid token")
```

**User ID Validation**:
```python
if token_user_id != url_user_id:
    raise HTTPException(status_code=403, detail="User ID mismatch")
```

---

## Error Codes

| Status Code | Meaning | When Returned |
|-------------|---------|---------------|
| 400 | Bad Request | Missing message, invalid JSON, malformed input |
| 401 | Unauthorized | Missing JWT, invalid signature, expired token |
| 403 | Forbidden | User ID in token doesn't match URL parameter |
| 404 | Not Found | Task/conversation not found or doesn't belong to user |
| 500 | Internal Error | Database error, agent error, unexpected exception |

---

## Rate Limiting (Future Enhancement)

**Proposed Limits**:
- 100 requests per minute per user
- 1000 requests per hour per user

**Headers**:
- `X-RateLimit-Limit`: Maximum requests allowed
- `X-RateLimit-Remaining`: Requests remaining
- `X-RateLimit-Reset`: Unix timestamp when limit resets

